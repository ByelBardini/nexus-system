name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend-tests:
    name: Testes Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependências
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci

      - name: Rodar testes
        run: npm test

  frontend-tests:
    name: Testes Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm run test:ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependências
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: mysql://ci:ci@localhost:3306/ci

      - name: Verificar lint
        run: npm run lint:check

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Verificar lint
        run: npm run lint:check

  formatacao:
    name: Formatação
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js (servidor)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependências do servidor
        working-directory: server
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true

      - name: Verificar formatação do servidor
        working-directory: server
        run: npm run format:check

      - name: Setup Node.js (cliente)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Instalar dependências do cliente
        working-directory: client
        run: npm ci

      - name: Verificar formatação do cliente
        working-directory: client
        run: npm run format:check
