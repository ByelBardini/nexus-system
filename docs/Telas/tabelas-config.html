<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabelas de Configuração — Mockup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    header {
      height: 80px; background: #fff; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; padding: 0 32px; flex-shrink: 0;
    }
    .back-btn {
      width: 36px; height: 36px; border: 1px solid #e2e8f0; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      color: #64748b; text-decoration: none; margin-right: 16px;
      transition: background .15s;
    }
    .back-btn:hover { background: #f1f5f9; color: #334155; }
    .back-btn svg { width: 16px; height: 16px; }
    .header-icon { color: #2563eb; font-size: 20px; margin-right: 12px; }
    .header-title { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: -.5px; color: #1e293b; }
    .header-sub { font-size: 11px; color: #64748b; margin-top: 1px; }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding: 24px; }
    .panel-wrap { max-width: 672px; }

    /* Panel */
    .panel { background: #fff; border: 1px solid #e2e8f0; border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.06); display: flex; flex-direction: column; }
    .panel-header { padding: 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 13px; font-weight: 700; color: #1e293b; display: flex; align-items: center; gap: 8px; }
    .panel-title .icon { color: #94a3b8; }
    .btn-new {
      background: #1e293b; color: #fff; border: none; border-radius: 4px;
      padding: 0 12px; height: 32px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .btn-new:hover { background: #0f172a; }

    /* Search */
    .search-wrap { padding: 16px; border-bottom: 1px solid #f1f5f9; }
    .search-inner { position: relative; }
    .search-inner input {
      width: 100%; height: 36px; padding: 0 12px 0 36px;
      background: #f1f5f9; border: 1px solid transparent; border-radius: 4px;
      font-size: 12px; outline: none;
    }
    .search-inner input:focus { background: #fff; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
    .search-icon { position: absolute; left: 10px; top: 8px; color: #94a3b8; font-size: 18px; pointer-events: none; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #f8fafc; }
    th {
      padding: 10px 16px; text-align: left; font-size: 10px; font-weight: 700;
      color: #94a3b8; text-transform: uppercase; letter-spacing: .05em;
      border-bottom: 1px solid #f1f5f9;
    }
    th.actions-col { width: 40px; }
    tbody tr { transition: background .1s; }
    tbody tr:hover { background: rgba(248,250,252,.5); }
    tbody tr + tr { border-top: 1px solid #f8fafc; }
    td { padding: 16px; font-size: 12px; }
    .td-name { font-weight: 700; color: #1e293b; }
    .td-name.inactive { color: #94a3b8; }
    .badge-sim { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: #92400e; background: #fffbeb; border: 1px solid #fde68a; border-radius: 4px; padding: 2px 8px; }
    .td-nao { font-size: 11px; color: #94a3b8; }
    .status-dot { display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-active { background: #10b981; }
    .dot-inactive { background: #94a3b8; }
    .status-label { font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .status-label.active { color: #475569; }
    .status-label.inactive-text { color: #94a3b8; }
    .row-inactive { opacity: .6; background: rgba(248,250,252,.2); }
    .actions-btn { background: none; border: none; cursor: pointer; color: #94a3b8; font-size: 18px; }
    .actions-btn:hover { color: #475569; }
    .empty-row td { padding: 48px 16px; text-align: center; font-size: 13px; color: #94a3b8; }

    /* Footer */
    .panel-footer { padding: 12px; border-top: 1px solid #f1f5f9; background: #f8fafc; text-align: center; }
    .footer-label { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
  </style>
</head>
<body>

  <header>
    <a href="/configuracoes" class="back-btn" title="Voltar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </a>
    <span class="header-icon">&#xe896;</span><!-- table_chart material icon placeholder -->
    <div>
      <div class="header-title">Tabelas de Configuração</div>
      <div class="header-sub">Gestão de tabelas auxiliares de configuração de aparelhos.</div>
    </div>
  </header>

  <div class="content">
    <div class="panel-wrap">
      <div class="panel">

        <!-- Panel header -->
        <div class="panel-header">
          <div class="panel-title">
            <span class="icon">⚠</span>
            Categorias de Falha de Rastreadores
          </div>
          <button class="btn-new">+ Nova Categoria</button>
        </div>

        <!-- Search -->
        <div class="search-wrap">
          <div class="search-inner">
            <span class="search-icon">&#x1F50D;</span>
            <input type="text" placeholder="Filtrar categorias..." />
          </div>
        </div>

        <!-- Table -->
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Exige Descrição</th>
              <th>Status</th>
              <th class="actions-col"></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="td-name">Dano Físico / Carcaça</span></td>
              <td><span class="td-nao">Não</span></td>
              <td>
                <div class="status-dot">
                  <div class="dot dot-active"></div>
                  <span class="status-label active">Ativo</span>
                </div>
              </td>
              <td><button class="actions-btn" title="Ações">⚙</button></td>
            </tr>
            <tr>
              <td><span class="td-name">Outro</span></td>
              <td><span class="badge-sim">✎ Sim</span></td>
              <td>
                <div class="status-dot">
                  <div class="dot dot-active"></div>
                  <span class="status-label active">Ativo</span>
                </div>
              </td>
              <td><button class="actions-btn" title="Ações">⚙</button></td>
            </tr>
            <tr class="row-inactive">
              <td><span class="td-name inactive">Obsoleta</span></td>
              <td><span class="td-nao">Não</span></td>
              <td>
                <div class="status-dot">
                  <div class="dot dot-inactive"></div>
                  <span class="status-label inactive-text">Inativo</span>
                </div>
              </td>
              <td><button class="actions-btn" title="Ações">⚙</button></td>
            </tr>
          </tbody>
        </table>

        <!-- Footer -->
        <div class="panel-footer">
          <span class="footer-label">Total: 3 Categorias</span>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
